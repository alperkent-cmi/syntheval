# Workflow to publish beta versions to PyPI
# Triggers on pre-release creation (not full releases)
# Make sure your version in pyproject.toml/setup.py follows PEP 440:
# - 1.7.0b1 (beta)
# - 1.7.0a1 (alpha)
# - 1.7.0rc1 (release candidate)

name: Publish Beta Release to PyPI

on:
  release:
    types: [prereleased]

permissions:
  contents: read

jobs:
  beta-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ">=3.9"

      - name: Build beta distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: beta-dists
          path: dist/

  pypi-publish-beta:
    runs-on: ubuntu-latest

    needs:
      - beta-build

    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    environment:
      name: beta-release
      url: https://pypi.org/project/syntheval

    steps:
      - name: Retrieve beta distributions
        uses: actions/download-artifact@v4
        with:
          name: beta-dists
          path: dist/

      - name: Publish beta release to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
